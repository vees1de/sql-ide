services:
  postgres:
    image: postgres:16-alpine
    container_name: sql-ide-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: sqlide
      POSTGRES_PASSWORD: sqlide
      POSTGRES_DB: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sqlide -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 20

  backend:
    build:
      context: ./backend
    container_name: sql-ide-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      APP_NAME: SQL IDE Backend
      ENVIRONMENT: docker
      API_PREFIX: /api
      SERVICE_DATABASE_URL: postgresql+psycopg://sqlide:sqlide@postgres:5432/sqlide_service
      ANALYTICS_DATABASE_URL: postgresql+psycopg://sqlide:sqlide@postgres:5432/sqlide_analytics
      BOOTSTRAP_DEMO_ANALYTICS: "true"
      ALLOWED_TABLES: orders,customers,campaigns
      DEFAULT_ROW_LIMIT: 200
      QUERY_TIMEOUT_SECONDS: 15
      DEMO_WORKSPACE_NAME: Demo Workspace
      DEMO_DATABASE_ID: demo_analytics
      DEMO_DATABASE_NAME: Demo Analytics DB
      CORS_ALLOW_ORIGINS: http://127.0.0.1:5173,http://localhost:5173,http://127.0.0.1:4173,http://localhost:4173
    ports:
      - "8001:8000"

volumes:
  postgres-data:
